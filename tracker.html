
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Solar Sync AI — Intelligent Energy Optimizer</title>
  <!-- Tailwind + Fonts + Chart.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f9fafb; overflow-x: hidden; }
    .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
    .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); transition: all 0.25s ease-out; }
    .gradient-btn { background: linear-gradient(135deg, #facc15, #f59e0b); transition: all 0.2s; }
    .gradient-btn:hover { box-shadow: 0 8px 20px rgba(245,158,11,0.4); transform: scale(0.98); }
    .active-nav { background: rgba(245,158,11,0.15); border-left: 3px solid #f59e0b; font-weight: 600; }
    .counter-value { transition: all 0.3s ease; }
    .chart-container canvas { max-height: 280px; width: 100%; }
    .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    .modal-transition { transition: opacity 0.2s ease, visibility 0.2s, transform 0.2s; }
  </style>
</head>
<body class="antialiased">

  <!-- NAVBAR (Sticky) -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-5 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-md"><span class="text-white text-lg font-bold">☀️</span></div>
          <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-amber-600 to-amber-800 bg-clip-text text-transparent">Solar Sync AI</span>
        </div>
        <div class="hidden md:flex space-x-1" id="nav-links">
          <a href="/" data-page="dashboard" class="nav-item px-4 py-2 rounded-lg text-gray-700 hover:bg-amber-50 transition">🏠 Dashboard</a>
          <a href="/analytics" data-page="analytics" class="nav-item px-4 py-2 rounded-lg text-gray-700 hover:bg-amber-50 transition">📈 Analytics</a>
          <a href="/devices" data-page="devices" class="nav-item px-4 py-2 rounded-lg text-gray-700 hover:bg-amber-50 transition">🔌 Devices</a>
          <a href="/cost" data-page="cost" class="nav-item px-4 py-2 rounded-lg text-gray-700 hover:bg-amber-50 transition">💰 Cost</a>
          <a href="/optimize" data-page="optimize" class="nav-item px-4 py-2 rounded-lg text-gray-700 hover:bg-amber-50 transition">⚡ Smart Optimize</a>
        </div>
        <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 font-semibold">AI</div></div>
      </div>
    </div>
  </nav>

  <!-- DYNAMIC PAGE CONTAINER -->
  <main id="app-root" class="max-w-7xl mx-auto px-5 lg:px-8 py-8 transition-all duration-300"></main>

  <!-- FLOATING CHATBOT BUTTON + MODAL -->
  <div id="chatbot-fab" class="fixed bottom-6 right-6 z-50 cursor-pointer group">
    <div class="bg-gradient-to-r from-amber-500 to-amber-600 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all duration-300"><span class="text-2xl">💬</span></div>
  </div>
  <div id="chat-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 invisible opacity-0 transition-all duration-200">
    <div class="glass-card w-[90%] max-w-md rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-all">
      <div class="bg-amber-500 px-5 py-4 flex justify-between items-center"><span class="font-bold text-white">🤖 Solar AI Assistant</span><button id="close-chat" class="text-white text-2xl leading-5">&times;</button></div>
      <div id="chat-messages" class="h-80 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
      <div class="p-3 border-t flex gap-2 flex-wrap" id="chat-quick-btns"></div>
      <div class="p-3 border-t flex"><input type="text" id="chat-input" placeholder="Ask me anything..." class="flex-1 border rounded-l-xl px-4 py-2 focus:outline-none focus:ring-1 focus:ring-amber-300"><button id="chat-send" class="bg-amber-500 px-4 rounded-r-xl text-white">Send</button></div>
    </div>
  </div>

  <script>
    // ---------- GLOBAL DATA & STATE ----------
    const devicesCatalog = [
      { "name": "Air Conditioner", "power": 1500 },
      { "name": "Fan", "power": 75 },
      { "name": "Television", "power": 120 },
      { "name": "Refrigerator", "power": 200 },
      { "name": "Washing Machine", "power": 500 },
      { "name": "Laptop", "power": 65 },
      { "name": "Lights", "power": 40 }
    ];
    let userDevices = JSON.parse(localStorage.getItem('solar_user_devices')) || [
      { id: 'd1', name: 'Air Conditioner', power: 1500, hours: 4, activeSlot: '14:00' },
      { id: 'd2', name: 'Fan', power: 75, hours: 8, activeSlot: '10:00' },
      { id: 'd3', name: 'Television', power: 120, hours: 3, activeSlot: '20:00' }
    ];
    const solarData = [
      {"date":"2024-01-01","predicted_solar":3.77,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-02","predicted_solar":3.78,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-03","predicted_solar":3.95,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-04","predicted_solar":3.96,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-05","predicted_solar":4.02,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-06","predicted_solar":3.97,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-07","predicted_solar":3.76,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-08","predicted_solar":3.72,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-09","predicted_solar":3.72,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-10","predicted_solar":3.9,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-11","predicted_solar":3.91,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-12","predicted_solar":3.97,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-13","predicted_solar":3.92,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-14","predicted_solar":3.71,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-15","predicted_solar":3.67,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-16","predicted_solar":3.67,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-17","predicted_solar":3.85,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-18","predicted_solar":3.86,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-19","predicted_solar":3.92,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-20","predicted_solar":3.87,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-21","predicted_solar":3.66,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-22","predicted_solar":3.62,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-23","predicted_solar":3.62,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-24","predicted_solar":3.8,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-25","predicted_solar":3.81,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-26","predicted_solar":3.86,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-27","predicted_solar":3.81,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-28","predicted_solar":3.6,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-29","predicted_solar":3.57,"peak_hours":["11AM","12PM","1PM"]},{"date":"2024-01-30","predicted_solar":3.57,"peak_hours":["11AM","12PM","1PM"]}
    ];
    let usageHistory = JSON.parse(localStorage.getItem('solar_usage_json')) || { dailyUsage: solarData.map(d => ({ date: d.date, consumption: 18 + Math.random() * 8 })) };
    let chartsStore = {};

    function saveToLocal() { localStorage.setItem('solar_user_devices', JSON.stringify(userDevices)); localStorage.setItem('solar_usage_json', JSON.stringify(usageHistory)); }
    function getTotalConsumption() { return userDevices.reduce((sum, d) => sum + (d.power * d.hours) / 1000, 0); }
    function getGridReduction() { let total = getTotalConsumption(); let solarGen = solarData.slice(0,7).reduce((a,b)=>a+b.predicted_solar,0)/7; let reduction = Math.min(100, Math.round((solarGen / (total+0.01)) * 70 + 15)); return reduction; }
    function getEnergyScore() { let reduction = getGridReduction(); return Math.min(100, 40 + Math.floor(reduction * 0.6)); }

    // Routing & rendering
    let currentRoute = 'dashboard';
    function navigate(route) { currentRoute = route; renderPage(); updateActiveNav(); }
    function updateActiveNav() { document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('active-nav', 'bg-amber-50', 'border-l-0'); if(el.getAttribute('data-page') === currentRoute) el.classList.add('active-nav','bg-amber-50'); }); }
    async function renderPage() {
      const root = document.getElementById('app-root'); root.innerHTML = '<div class="flex justify-center py-20"><div class="skeleton w-32 h-32 rounded-full"></div></div>';
      setTimeout(async () => {
        if (currentRoute === 'dashboard') root.innerHTML = await renderDashboard();
        else if (currentRoute === 'analytics') root.innerHTML = await renderAnalytics();
        else if (currentRoute === 'devices') root.innerHTML = renderDevices();
        else if (currentRoute === 'cost') root.innerHTML = renderCost();
        else if (currentRoute === 'optimize') root.innerHTML = renderOptimize();
        attachPageEvents();
        if (currentRoute === 'dashboard') initDashboardCharts();
        if (currentRoute === 'analytics') initAnalyticsCharts();
        if (currentRoute === 'devices') initDeviceEnergyBar();
        if (currentRoute === 'cost') initCostCharts();
        if (currentRoute === 'optimize') initOptimizeSim();
      }, 20);
    }
    function attachPageEvents() { document.querySelectorAll('.nav-item').forEach(a => { a.addEventListener('click', (e) => { e.preventDefault(); navigate(a.getAttribute('data-page')); }); }); }

    // ---------- DASHBOARD ----------
    async function renderDashboard() {
      let score = getEnergyScore(); let savingsVal = (getTotalConsumption() * 0.12 * 30).toFixed(0); let reduction = getGridReduction();
      return `<div class="animate-fade-in space-y-8"><div class="bg-gradient-to-r from-amber-50 via-white to-amber-50 rounded-3xl p-6 shadow-sm border"><h1 class="text-3xl font-bold bg-gradient-to-r from-amber-700 to-amber-500 bg-clip-text text-transparent">Smart Energy Intelligence</h1><p class="text-gray-500">Real‑time AI solar optimization</p></div>
      <div class="grid md:grid-cols-4 gap-6"><div class="glass-card rounded-2xl p-5 hover-lift"><div class="text-sm text-gray-500">Energy Score</div><div class="text-3xl font-black mt-1" id="score-val">${score}</div><div class="w-full mt-2 bg-gray-200 rounded-full h-2"><div class="bg-amber-500 h-2 rounded-full" style="width:${score}%"></div></div></div>
      <div class="glass-card rounded-2xl p-5 hover-lift"><div class="text-sm text-gray-500">Monthly Savings</div><div class="text-3xl font-black text-green-600" id="savings-counter">₹${savingsVal}</div></div>
      <div class="glass-card rounded-2xl p-5 hover-lift"><div class="text-sm text-gray-500">Grid Reduction</div><div class="text-3xl font-black text-blue-600">${reduction}%</div></div>
      <div class="glass-card rounded-2xl p-5 hover-lift"><div class="text-sm text-gray-500">Solar Status</div><div class="flex items-center gap-2"><span class="text-2xl">☀️</span><span class="font-bold text-amber-600">Peak Generation</span></div></div></div>
      <div class="grid lg:grid-cols-3 gap-6"><div class="glass-card rounded-2xl p-5 col-span-1"><h3 class="font-semibold mb-3">⚡ Live Insight</h3><p id="live-insight-text" class="text-gray-700">Analyzing solar vs usage...</p></div><div class="glass-card rounded-2xl p-5 col-span-2"><h3 class="font-semibold">Device Energy Bar (Real-time)</h3><canvas id="deviceEnergyBar" height="180"></canvas></div></div>
      <div class="grid md:grid-cols-2 gap-6"><div class="glass-card rounded-2xl p-5"><h3 class="font-semibold">📈 Solar vs Usage (Line)</h3><canvas id="lineChartSolar" height="200"></canvas></div><div class="glass-card rounded-2xl p-5"><h3 class="font-semibold">🥧 Energy Mix</h3><canvas id="pieMixChart" height="200"></canvas></div></div>
      <div class="glass-card rounded-2xl p-5"><h3 class="font-semibold">💰 Hourly Savings (Bar)</h3><canvas id="hourlySavingsChart" height="200"></canvas></div></div>`;
    }
    function initDashboardCharts() {
      const ctxLine = document.getElementById('lineChartSolar')?.getContext('2d');
      const ctxPie = document.getElementById('pieMixChart')?.getContext('2d');
      const ctxBarSave = document.getElementById('hourlySavingsChart')?.getContext('2d');
      if(ctxLine) new Chart(ctxLine, { type: 'line', data: { labels: solarData.slice(0,10).map(d=>d.date.slice(5)), datasets: [{ label: 'Solar (kWh)', data: solarData.slice(0,10).map(d=>d.predicted_solar), borderColor: '#f59e0b', tension: 0.3 }, { label: 'Usage (kWh)', data: usageHistory.dailyUsage.slice(0,10).map(u=>u.consumption), borderColor: '#3b82f6' }] } });
      if(ctxPie) new Chart(ctxPie, { type: 'pie', data: { labels: ['Solar', 'Grid', 'Storage'], datasets: [{ data: [38, 42, 20], backgroundColor: ['#facc15','#3b82f6','#10b981'] }] } });
      if(ctxBarSave) new Chart(ctxBarSave, { type: 'bar', data: { labels: ['6-9AM','9-12PM','12-3PM','3-6PM','6-9PM'], datasets: [{ label: 'Savings (₹)', data: [45, 112, 184, 93, 27], backgroundColor: '#10b981' }] } });
      updateInsightText(); initDeviceEnergyBar();
    }
    function updateInsightText() { let insightDiv = document.getElementById('live-insight-text'); if(insightDiv) insightDiv.innerText = `☀️ Solar peak 11AM-1PM → shift heavy loads. ${getTotalConsumption().toFixed(1)} kWh daily. Save ₹${(getTotalConsumption()*0.12*30).toFixed(0)}/month.`; }
    function initDeviceEnergyBar() { let canvas = document.getElementById('deviceEnergyBar'); if(!canvas) return; let ctx = canvas.getContext('2d'); if(chartsStore.deviceBar) chartsStore.deviceBar.destroy(); let labels = userDevices.map(d=>d.name); let data = userDevices.map(d=> (d.power * d.hours)/1000); chartsStore.deviceBar = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'kWh/day', data, backgroundColor: '#f59e0b', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: true } }); }

    // ANALYTICS
    async function renderAnalytics() { return `<div class="space-y-7"><h2 class="text-2xl font-bold">📊 Generation & Efficiency Analytics</h2><div class="grid lg:grid-cols-2 gap-6"><div class="glass-card p-5"><h3 class="font-semibold mb-2">Monthly Solar Trend</h3><canvas id="solarTrend" height="200"></canvas></div><div class="glass-card p-5"><h3 class="font-semibold mb-2">Consumption vs Generation</h3><canvas id="compGen" height="200"></canvas></div><div class="glass-card p-5"><h3 class="font-semibold mb-2">Efficiency Trend (Solar/Usage)</h3><canvas id="efficiencyTrend" height="200"></canvas></div><div class="glass-card p-5"><h3 class="font-semibold">⚡ Peak Hour Highlight</h3><div class="bg-amber-100 p-3 rounded-xl mt-2"><span class="font-bold">🌞 Peak Solar Hours: 11AM - 1PM</span><div class="text-sm text-gray-600">Highest generation: ~4.02 kWh on Jan 5</div></div></div></div></div>`; }
    function initAnalyticsCharts() { if(document.getElementById('solarTrend')) new Chart(document.getElementById('solarTrend'), { type:'line', data:{ labels:solarData.slice(0,20).map(d=>d.date.slice(5)), datasets:[{ label:'Solar (kWh)', data:solarData.slice(0,20).map(d=>d.predicted_solar), borderColor:'#f59e0b', fill:false }] } }); if(document.getElementById('compGen')) new Chart(document.getElementById('compGen'), { type:'bar', data:{ labels:solarData.slice(0,12).map(d=>d.date.slice(5)), datasets:[{ label:'Solar Gen', data:solarData.slice(0,12).map(d=>d.predicted_solar), backgroundColor:'#facc15' },{ label:'Consumption', data:usageHistory.dailyUsage.slice(0,12).map(u=>u.consumption), backgroundColor:'#3b82f6' }] } }); if(document.getElementById('efficiencyTrend')) new Chart(document.getElementById('efficiencyTrend'), { type:'line', data:{ labels:solarData.slice(0,15).map(d=>d.date.slice(5)), datasets:[{ label:'Efficiency %', data:solarData.slice(0,15).map((d,i)=> Math.min(100, (d.predicted_solar / (usageHistory.dailyUsage[i]?.consumption||8))*100)), borderColor:'#10b981' }] } }); }

    // DEVICES (Fully interactive)
    function renderDevices() { let options = devicesCatalog.map(d=>`<option value="${d.name}" data-power="${d.power}">${d.name} (${d.power}W)</option>`).join(''); return `<div class="space-y-6"><div class="glass-card p-6"><h2 class="text-2xl font-bold">🔌 Device Manager</h2><div class="grid md:grid-cols-3 gap-4 mt-4"><select id="deviceSelect" class="border rounded-xl p-2">${options}</select><input id="hoursInput" type="number" placeholder="Hours/day" class="border rounded-xl p-2"><input id="timeSlot" placeholder="Start hour (e.g., 14:00)" class="border rounded-xl p-2"></div><div class="flex gap-3 mt-5"><button id="addDeviceBtn" class="gradient-btn px-6 py-2 rounded-xl text-white font-medium">+ Add Device</button><button id="editDeviceBtn" class="bg-blue-500 px-5 py-2 rounded-xl text-white">✏️ Edit</button><button id="deleteDeviceBtn" class="bg-red-500 px-5 py-2 rounded-xl text-white">🗑 Delete</button></div></div><div class="glass-card p-5"><h3 class="font-bold text-lg">⚡ Live Energy Tracking</h3><div id="deviceListTable" class="space-y-2 my-3"></div><div class="mt-3 p-3 bg-gray-100 rounded-xl"><span class="font-semibold">Total Consumption: </span><span id="totalConsumptionKwh" class="text-amber-700 font-black">${getTotalConsumption().toFixed(2)} kWh/day</span></div><canvas id="deviceBarLive" height="200"></canvas></div></div>`; }
    function refreshDeviceTableAndGraph() { let container = document.getElementById('deviceListTable'); if(container) container.innerHTML = userDevices.map(d => `<div class="flex justify-between p-2 border-b"><span><strong>${d.name}</strong> (${d.power}W, ${d.hours}h @ ${d.activeSlot})</span><span>${(d.power*d.hours/1000).toFixed(2)} kWh</span></div>`).join(''); let totalSpan = document.getElementById('totalConsumptionKwh'); if(totalSpan) totalSpan.innerText = getTotalConsumption().toFixed(2) + ' kWh/day'; let canvas = document.getElementById('deviceBarLive'); if(canvas && chartsStore.deviceLiveBar) { chartsStore.deviceLiveBar.destroy(); } if(canvas){ let ctx = canvas.getContext('2d'); chartsStore.deviceLiveBar = new Chart(ctx, { type:'bar', data:{ labels: userDevices.map(d=>d.name), datasets:[{ label:'kWh/day', data: userDevices.map(d=> (d.power*d.hours/1000)), backgroundColor:'#f59e0b' }] } }); } saveToLocal(); if(currentRoute==='dashboard') initDeviceEnergyBar(); else if(currentRoute==='devices') updateInsightText(); }
    function attachDeviceEvents(){ document.getElementById('addDeviceBtn')?.addEventListener('click',()=>{ let select = document.getElementById('deviceSelect'); let name = select.value; let power = parseInt(select.options[select.selectedIndex].getAttribute('data-power')); let hours = parseFloat(document.getElementById('hoursInput').value)||1; let slot = document.getElementById('timeSlot').value||'12:00'; if(name){ userDevices.push({ id: Date.now().toString(), name, power, hours, activeSlot: slot }); refreshDeviceTableAndGraph(); } }); document.getElementById('editDeviceBtn')?.addEventListener('click',()=>{ let nameSel = document.getElementById('deviceSelect').value; let hours = parseFloat(document.getElementById('hoursInput').value); let slot = document.getElementById('timeSlot').value; let device = userDevices.find(d=>d.name===nameSel); if(device){ device.hours = hours||device.hours; device.activeSlot = slot||device.activeSlot; refreshDeviceTableAndGraph(); } }); document.getElementById('deleteDeviceBtn')?.addEventListener('click',()=>{ let nameSel = document.getElementById('deviceSelect').value; userDevices = userDevices.filter(d=>d.name!==nameSel); refreshDeviceTableAndGraph(); }); refreshDeviceTableAndGraph(); }

    // COST PAGE
    function renderCost(){ return `<div class="glass-card p-7 space-y-5"><h2 class="text-2xl font-bold">💰 Energy Cost Analyzer</h2><div><label>Previous Bill (₹)</label><input id="prevBill" type="number" class="border p-2 rounded-xl w-full" placeholder="e.g., 3200"></div><button id="calcCostBtn" class="gradient-btn mt-3 px-6 py-2 rounded-xl text-white">Calculate Savings</button><div class="grid md:grid-cols-2 gap-5 mt-5"><div class="p-4 bg-green-50 rounded-2xl"><div>Estimated Savings</div><div id="savingsAmount" class="text-3xl font-bold text-green-700">₹0</div></div><div class="p-4 bg-blue-50 rounded-2xl"><div>Current Estimate</div><div id="currentEstimate" class="text-2xl font-bold">₹---</div></div></div><canvas id="costComparisonChart" height="200"></canvas></div>`; }
    function initCostCharts(){ document.getElementById('calcCostBtn')?.addEventListener('click',()=>{ let prev = parseFloat(document.getElementById('prevBill').value); if(isNaN(prev)) return; let currEst = (getTotalConsumption() * 30 * 7.5).toFixed(0); let savings = prev - currEst; document.getElementById('savingsAmount').innerText = `₹${Math.max(0,savings).toFixed(0)}`; document.getElementById('currentEstimate').innerText = `₹${currEst}`; let ctx = document.getElementById('costComparisonChart')?.getContext('2d'); if(ctx && chartsStore.costChart) chartsStore.costChart.destroy(); if(ctx) chartsStore.costChart = new Chart(ctx, { type:'bar', data:{ labels:['Previous Bill','Optimized Bill'], datasets:[{ data:[prev, currEst], backgroundColor:['#ef4444','#10b981'] }] } }); }); }

    // OPTIMIZE PAGE (WOW)
    function renderOptimize(){ return `<div class="space-y-7"><div class="glass-card p-6"><h2 class="text-2xl font-bold">⚡ Smart Optimizer — What‑if Simulation</h2><div id="deviceSimList" class="space-y-3 my-4"></div><button id="runOptimizePlan" class="gradient-btn px-5 py-2 rounded-xl">Generate Smart Plan</button></div><div id="recommendationCards" class="grid md:grid-cols-2 gap-5"></div><div class="glass-card p-5"><h3 class="font-bold">Best Schedule Preview</h3><div id="bestSchedulePreview" class="text-sm text-gray-600"></div></div></div>`; }

','opacity-100'); }; closeBtn.onclick = ()=>{ modal.classList.add('invisible','opacity-0'); }; }
